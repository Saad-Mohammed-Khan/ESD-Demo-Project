spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_prod
spring.datasource.username=ecommerce_prod
spring.datasource.password=${DB_PASSWORD:prod_password}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.com.example.ecommerce=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN


